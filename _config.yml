title: Your Name
tagline: PhD Student, Condensed Matter Physics
description: >-
  Personal site of [Your Name], a PhD student in condensed matter physics
  at the University of Washington.
author:
  name: Your Name
  email: you@uw.edu
  orcid: 0000-0000-0000-0000
  github: your-handle
  scholar: ""        # Google Scholar user ID
  arxiv: ""          # arxiv author identifier
  affiliation: Department of Physics, University of Washington
  office: PAB B-XXX

url: "https://your-handle.github.io"
baseurl: ""

permalink: /:title/
markdown: kramdown
highlighter: rouge
sass:
  style: compressed

# Files in /pages/ become top-level routes
include:
  - pages

collections:
  publications:
    output: false
  talks:
    output: false

defaults:
  - scope: { path: "", type: "pages" }
    values:
      layout: page

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
