<header class="site-header">
  <a class="wordmark" href="{{ '/' | relative_url }}">
    <span class="wordmark__name">{{ site.author.name }}</span>
    <span class="wordmark__meta">{{ site.author.affiliation }}</span>
  </a>
  <nav class="site-nav" aria-label="Primary">
    <ul>
      {% for item in site.data.nav %}
      <li><a href="{{ item.url | relative_url }}"{% if page.url contains item.url %} aria-current="page"{% endif %}>{{ item.name }}</a></li>
      {% endfor %}
    </ul>
  </nav>
</header>
